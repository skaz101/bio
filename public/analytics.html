<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Bio analytics</title>
    <style>
      :root{color-scheme:dark;font-family:system-ui,sans-serif;background:#08080c;color:#f4f4f5}*{box-sizing:border-box}body{margin:0;padding:32px 18px;background:radial-gradient(circle at 20% 0,#8b5cf622,transparent 35%),#08080c;min-height:100vh}main{width:min(1150px,100%);margin:auto}h1{margin:0;font-size:clamp(28px,5vw,44px)}.sub{color:#92929e;margin:8px 0 26px}.login,.summary,.visitor{border:1px solid #ffffff16;background:#14141bd9;border-radius:16px}.login{display:flex;gap:10px;padding:14px;max-width:520px}input{min-width:0;flex:1;border:1px solid #ffffff18;background:#09090d;color:#fff;border-radius:10px;padding:12px;font:inherit}button{border:0;border-radius:10px;padding:12px 17px;background:#8b5cf6;color:#fff;font-weight:700;cursor:pointer}.version{margin:9px 0 0;color:#62626d;font:11px ui-monospace,monospace}.error{color:#fb7185;min-height:24px;margin:10px 0}.summary{display:flex;justify-content:space-between;align-items:center;padding:18px;margin-bottom:13px}.summary strong{font-size:28px}.summary span,.visitor small{color:#92929e}.list{display:grid;gap:10px}.visitor{display:grid;grid-template-columns:1.35fr .8fr 1fr 1fr 1fr;gap:14px;padding:16px}.visitor strong,.visitor span{overflow:hidden;text-overflow:ellipsis}.visitor div{display:grid;gap:4px}.empty{padding:28px;color:#92929e;text-align:center}@media(max-width:800px){body{padding-top:20px}.login{display:grid}.visitor{grid-template-columns:1fr 1fr}.summary{align-items:flex-start;gap:10px}}
    </style>
  </head>
  <body>
    <main>
      <h1>Visitor analytics</h1>
      <p class="sub">Approximate Cloudflare location data · latest 100 unique IPs · 30-day activity retention</p>
      <form class="login" id="login"><input id="password" type="password" autocomplete="current-password" placeholder="Analytics password" required /><button>View analytics</button></form>
      <p class="version" id="version">Dashboard v1.1.0</p>
      <p class="error" id="error"></p>
      <section id="dashboard" hidden>
        <div class="summary"><div><span>Total views</span><br><strong id="total">0</strong></div><span>IP addresses are encrypted at rest</span></div>
        <div class="list" id="visitors"></div>
      </section>
    </main>
    <script>
      const form=document.getElementById("login"),error=document.getElementById("error"),dashboard=document.getElementById("dashboard"),list=document.getElementById("visitors");
      const escapeText=(value)=>{const span=document.createElement("span");span.textContent=value;return span.innerHTML};
      form.addEventListener("submit",async(event)=>{event.preventDefault();error.textContent="";try{const response=await fetch("/api/analytics",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({password:document.getElementById("password").value})});const data=await response.json();if(!response.ok)throw new Error(data.error||"Unable to load analytics");document.getElementById("version").textContent=`Dashboard v1.1.0 · API v${data.version||"unknown"}`;document.getElementById("total").textContent=data.count.toLocaleString();list.innerHTML=data.visitors.length?data.visitors.map(visitor=>`<article class="visitor"><div><small>LOCATION</small><strong>${escapeText(visitor.city)}, ${escapeText(visitor.region)}</strong><span>${escapeText(visitor.country)} · ${escapeText(visitor.timezone)}</span></div><div><small>IP ADDRESS</small><strong>${escapeText(visitor.ip)}</strong><span>Encrypted in KV</span></div><div><small>DEVICE</small><strong>${escapeText(visitor.device)}</strong><span>${escapeText(visitor.os)} · ${escapeText(visitor.browser)}</span></div><div><small>ACTIVITY</small><strong>${Number(visitor.visits||1).toLocaleString()} visit${Number(visitor.visits||1)===1?"":"s"}</strong><span>First ${new Date(visitor.firstVisitedAt||visitor.visitedAt).toLocaleDateString()}</span></div><div><small>LAST SEEN</small><strong>${new Date(visitor.visitedAt).toLocaleDateString()}</strong><span>${new Date(visitor.visitedAt).toLocaleTimeString()} · ${escapeText(visitor.referrer)}</span></div></article>`).join(""):`<div class="visitor empty">No new visits recorded yet.</div>`;dashboard.hidden=false;form.hidden=true}catch(failure){error.textContent=failure.message}});
    </script>
  </body>
</html>
