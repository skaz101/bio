<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Bio analytics</title>
    <style>
      :root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#08080c;color:#f4f4f5;--accent:#8b5cf6;--panel:#14141be8;--border:#ffffff16;--muted:#92929e}*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:clamp(18px,3vw,42px);background:radial-gradient(circle at 15% 0,#8b5cf62b,transparent 36%),radial-gradient(circle at 90% 15%,#22d3ee12,transparent 30%),#08080c}main{width:100%;margin:auto}h1{margin:0;font-size:clamp(30px,4vw,48px);letter-spacing:-.04em}.sub{max-width:720px;color:var(--muted);margin:8px 0 26px}.login,.summary,.visitor{border:1px solid var(--border);background:linear-gradient(135deg,#ffffff08,transparent 45%),var(--panel);box-shadow:0 14px 40px #0003}.login{display:flex;gap:10px;width:min(100%,560px);padding:14px;border-radius:16px}input{min-width:0;flex:1;border:1px solid #ffffff18;background:#09090d;color:#fff;border-radius:10px;padding:12px;font:inherit;outline:none}input:focus{border-color:#8b5cf699;box-shadow:0 0 0 3px #8b5cf622}button{border:0;border-radius:10px;padding:12px 18px;background:linear-gradient(135deg,var(--accent),#6d4ae8);color:#fff;font-weight:700;cursor:pointer}.version{margin:9px 0 0;color:#62626d;font:11px ui-monospace,monospace}.error{color:#fb7185;min-height:24px;margin:10px 0}.summary{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;margin-bottom:14px;border-radius:18px}.summary strong{font-size:32px}.summary span,.visitor small{color:var(--muted)}.list{display:grid;gap:12px}.visitor{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(180px,100%),1fr));gap:clamp(12px,2vw,26px);width:100%;padding:clamp(16px,2vw,24px);border-radius:18px;transition:border-color .2s,transform .2s}.visitor:hover{border-color:#8b5cf655;transform:translateY(-1px)}.visitor div{display:flex;min-width:0;flex-direction:column;gap:5px}.visitor small{font:600 10px ui-monospace,monospace;letter-spacing:.1em}.visitor strong,.visitor span{min-width:0;overflow-wrap:anywhere;word-break:break-word}.visitor strong{font-size:14px;line-height:1.35}.visitor span{color:#a5a5af;font-size:12px;line-height:1.45}.empty{display:block;padding:32px;color:var(--muted);text-align:center}@media(max-width:640px){body{padding:16px 12px}.login{display:grid}.summary{align-items:flex-start;gap:12px;padding:17px}.summary>span{max-width:150px;text-align:right}.visitor{grid-template-columns:repeat(auto-fit,minmax(min(150px,100%),1fr));gap:16px}.visitor div{padding-bottom:12px;border-bottom:1px solid #ffffff0d}.visitor div:last-child{padding-bottom:0;border-bottom:0}}@media(max-width:380px){.visitor{grid-template-columns:1fr}.summary{display:grid}.summary>span{text-align:left}}
    </style>
  </head>
  <body>
    <main>
      <h1>Visitor analytics</h1>
      <p class="sub">Approximate location and ISP data · latest 100 unique IPs · 30-day activity retention</p>
      <form class="login" id="login"><input id="password" type="password" autocomplete="current-password" placeholder="Analytics password" required /><button>View analytics</button></form>
      <p class="version" id="version">Dashboard v1.3.1</p>
      <p class="error" id="error"></p>
      <section id="dashboard" hidden>
        <div class="summary"><div><span>Total views</span><br><strong id="total">0</strong></div><span>IP addresses are encrypted at rest</span></div>
        <div class="list" id="visitors"></div>
      </section>
    </main>
    <script>
      const form=document.getElementById("login"),error=document.getElementById("error"),dashboard=document.getElementById("dashboard"),list=document.getElementById("visitors");
      const escapeText=(value)=>{const span=document.createElement("span");span.textContent=value;return span.innerHTML};
      form.addEventListener("submit",async(event)=>{event.preventDefault();error.textContent="";try{const response=await fetch("/api/analytics",{method:"POST",cache:"no-store",headers:{"content-type":"application/json"},body:JSON.stringify({password:document.getElementById("password").value})});const data=await response.json();if(!response.ok)throw new Error(data.error||"Unable to load analytics");document.getElementById("password").value="";document.getElementById("version").textContent=`Dashboard v1.3.1 · API v${data.version||"unknown"} · ${data.security?.ipEncryption||"unknown encryption"}`;document.getElementById("total").textContent=data.count.toLocaleString();list.innerHTML=data.visitors.length?data.visitors.map(visitor=>`<article class="visitor"><div><small>LOCATION</small><strong>${escapeText(visitor.city)}, ${escapeText(visitor.region)}</strong><span>${escapeText(visitor.country)} · ${escapeText(visitor.timezone)}${visitor.latitude!=null&&visitor.longitude!=null?` · ${escapeText(visitor.latitude)}, ${escapeText(visitor.longitude)}`:""}${visitor.colo?` · ${escapeText(visitor.colo)}`:""}</span></div><div><small>ISP / NETWORK</small><strong>${escapeText(visitor.isp||"Unknown")}</strong><span>${visitor.asn?`AS${escapeText(visitor.asn)}`:"ASN unavailable"}</span></div><div><small>IP ADDRESS</small><strong>${escapeText(visitor.ip)}</strong><span>AES-GCM encrypted in KV</span></div><div><small>DEVICE</small><strong>${escapeText(visitor.device)}</strong><span>${escapeText(visitor.os)} · ${escapeText(visitor.browser)}</span></div><div><small>ACTIVITY</small><strong>${Number(visitor.visits||1).toLocaleString()} visit${Number(visitor.visits||1)===1?"":"s"}</strong><span>First ${new Date(visitor.firstVisitedAt||visitor.visitedAt).toLocaleDateString()}</span></div><div><small>LAST SEEN</small><strong>${new Date(visitor.visitedAt).toLocaleDateString()}</strong><span>${new Date(visitor.visitedAt).toLocaleTimeString()} · ${escapeText(visitor.referrer)}</span></div></article>`).join(""):`<div class="visitor empty">No new visits recorded yet.</div>`;dashboard.hidden=false;form.hidden=true}catch(failure){error.textContent=failure.message}});
    </script>
  </body>
</html>
